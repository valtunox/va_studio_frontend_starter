  TF_WORKING_DIR: workflows/b6bec1b0
  AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION:            ${{ secrets.AWS_REGION || 'us-east-1' }}

concurrency:
  group: prodxcloud-wf-b6bec1b0-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # Plan: runs on every push / PR
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true
      - name: Terraform Init
        id: init
        run: terraform init
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true
      - name: PR Comment Plan Summary
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          script: |
            const output = [
              '## prodxcloud | Workflow: AutomatedWorfklowDemo1',
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| Format | `${{ steps.fmt.outcome }}` |',
              '| Init   | `${{ steps.init.outcome }}` |',
              '| Validate | `${{ steps.validate.outcome }}` |',
              '| Plan   | `${{ steps.plan.outcome }}` |',
              '',
              '<details><summary>Terraform Plan Output</summary>',
              '',
              '```terraform',
              process.env.PLAN,
              '```',
              '</details>',
              '',
              '> Session: `b6bec1b0-4595-4e61-8474-8cf1e0dfacbb` | Branch: `workflow/b6bec1b0`',
              '> Auto-provisioned by prodxcloud'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

