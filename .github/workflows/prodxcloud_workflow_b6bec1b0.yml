          aws-region:            ${{ env.AWS_REGION }}
      - name: Terraform Init
        run: terraform init
      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
      - name: Destroy Summary
        if: always()
        run: |
          echo "## prodxcloud | Destroyed AutomatedWorfklowDemo1" >> $GITHUB_STEP_SUMMARY
          echo "Session: `b6bec1b0-4595-4e61-8474-8cf1e0dfacbb`" >> $GITHUB_STEP_SUMMARY
          echo "Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
